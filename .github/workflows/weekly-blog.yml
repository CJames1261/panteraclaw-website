name: Weekly Blog Post

on:
  schedule:
    # Every Monday at 8:00 AM Mountain Time (UTC-6 = 14:00 UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-blog-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python .github/scripts/generate_blog_post.py

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "blog: publish weekly post"
          file_pattern: "SEO-Optimized Consulting Framework/src/app/pages/blog/posts/*.tsx SEO-Optimized Consulting Framework/src/app/pages/blog/posts/index.ts"
          commit_user_name: "Pantera Claw Blog Agent"
          commit_user_email: "blog-agent@panteraclaw.com"
